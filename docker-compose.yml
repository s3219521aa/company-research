version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/cache.db

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
